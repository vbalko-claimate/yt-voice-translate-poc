<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Voice Translate</h1>

      <label>
        Server
        <input id="serverUrl" value="ws://127.0.0.1:8787">
      </label>

      <label>
        Target
        <select id="targetLanguage">
          <option value="cs">Czech</option>
          <option value="sk">Slovak</option>
          <option value="de">German</option>
          <option value="en">English</option>
        </select>
      </label>

      <label>
        Original volume
        <input id="originalVolume" type="range" min="0" max="1" step="0.05" value="0.2">
      </label>

      <label>
        Voice volume
        <input id="voiceVolume" type="range" min="0" max="1" step="0.05" value="1">
      </label>

      <label>
        TTS
        <select id="ttsProvider">
          <option value="">Server default</option>
          <option value="external">Local Piper</option>
          <option value="elevenlabs">ElevenLabs</option>
          <option value="none">Text fallback</option>
        </select>
      </label>

      <section id="elevenLabsFields" class="provider-fields">
        <label>
          ElevenLabs API key
          <input id="elevenLabsApiKey" type="password" placeholder="sk_...">
        </label>

        <label>
          Voice ID
          <input id="elevenLabsVoiceId" placeholder="JBFqnCBsd6RMkjVDRZzb">
        </label>

        <label>
          Model
          <select id="elevenLabsModelId">
            <option value="eleven_flash_v2_5">Flash v2.5</option>
            <option value="eleven_turbo_v2_5">Turbo v2.5</option>
            <option value="eleven_multilingual_v2">Multilingual v2</option>
            <option value="eleven_v3">Eleven v3</option>
          </select>
        </label>
      </section>

      <div class="actions">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
      </div>

      <p id="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
